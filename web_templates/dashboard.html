<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gavel Order Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f1f5f9;
    --card:     #ffffff;
    --border:   #e2e8f0;
    --text:     #0f172a;
    --muted:    #64748b;
    --primary:  #2563eb;
    --primary-h:#1d4ed8;
    --success:  #16a34a;
    --warning:  #d97706;
    --error:    #dc2626;
    --running:  #7c3aed;
    --radius:   10px;
    --shadow:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-md:0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: #0f172a;
    color: #fff;
    padding: 0 1.5rem;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .header-left { display: flex; align-items: center; gap: .75rem; }
  .header-logo { font-size: 1.25rem; }
  .header-title { font-size: 1rem; font-weight: 600; letter-spacing: -.01em; }
  .status-pill {
    font-size: .72rem;
    font-weight: 600;
    padding: .2rem .65rem;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: .05em;
    transition: background .3s, color .3s;
  }
  .status-pill.idle    { background: #1e293b; color: #94a3b8; }
  .status-pill.running { background: #4c1d95; color: #c4b5fd; }

  /* ── Main layout ── */
  main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

  .grid-top {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    margin-bottom: 1.25rem;
  }
  @media (max-width: 720px) { .grid-top { grid-template-columns: 1fr; } }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.25rem 1.5rem;
  }
  .card-title {
    font-size: .8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: .45rem;
    padding: .5rem 1.1rem;
    border-radius: 7px;
    font-size: .875rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: background .15s, opacity .15s, transform .1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-h); }
  .btn-primary:disabled { opacity: .55; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: transparent;
    color: var(--primary);
    border: 1.5px solid var(--primary);
  }
  .btn-ghost:hover { background: #eff6ff; }
  .btn-sm { padding: .3rem .7rem; font-size: .8rem; border-radius: 5px; }
  .btn-run {
    background: var(--primary);
    color: #fff;
    padding: .55rem 1.4rem;
    font-size: .95rem;
  }
  .btn-run:hover { background: var(--primary-h); }
  .btn-run:disabled { opacity: .55; cursor: not-allowed; transform: none; }

  /* ── Spinner ── */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  .spinner.show { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Run Now card ── */
  .run-row { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
  .run-status-text { font-size: .85rem; color: var(--muted); }
  .run-status-text.active { color: var(--running); font-weight: 600; }

  .advanced-toggle {
    font-size: .8rem;
    color: var(--primary);
    cursor: pointer;
    text-decoration: underline;
    border: none;
    background: none;
    padding: 0;
    margin-top: .6rem;
    display: block;
  }
  .advanced-section { display: none; margin-top: .85rem; }
  .advanced-section.open { display: block; }
  .advanced-section label {
    font-size: .8rem;
    color: var(--muted);
    font-weight: 600;
    display: block;
    margin-bottom: .35rem;
  }
  .advanced-section textarea {
    width: 100%;
    height: 72px;
    padding: .5rem .65rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: monospace;
    font-size: .82rem;
    resize: vertical;
    color: var(--text);
  }
  .advanced-section textarea:focus { outline: none; border-color: var(--primary); }
  .advanced-hint { font-size: .75rem; color: var(--muted); margin-top: .3rem; }

  /* ── Last run stats ── */
  .stat-row { display: flex; gap: 1.5rem; margin-top: .25rem; flex-wrap: wrap; }
  .stat-item { }
  .stat-val { font-size: 1.6rem; font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: .72rem; color: var(--muted); text-transform: uppercase;
               letter-spacing: .05em; margin-top: .2rem; }
  .badge {
    display: inline-flex; align-items: center; gap: .3rem;
    font-size: .78rem; font-weight: 600;
    padding: .22rem .6rem; border-radius: 999px;
  }
  .badge-success { background: #dcfce7; color: var(--success); }
  .badge-warning { background: #fef9c3; color: var(--warning); }
  .badge-error   { background: #fee2e2; color: var(--error); }
  .badge-running { background: #ede9fe; color: var(--running); }
  .badge-idle    { background: #f1f5f9; color: var(--muted); }

  /* ── Schedule card ── */
  .sched-toggle-row {
    display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem;
  }
  .toggle-switch {
    position: relative; width: 42px; height: 24px;
    cursor: pointer; display: inline-block;
  }
  .toggle-switch input { display: none; }
  .toggle-track {
    position: absolute; inset: 0;
    background: #cbd5e1;
    border-radius: 999px;
    transition: background .2s;
  }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    background: #fff;
    border-radius: 50%;
    transition: transform .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .toggle-switch input:checked ~ .toggle-track { background: var(--primary); }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(18px); }
  .toggle-label { font-size: .875rem; font-weight: 600; }

  .field-row { display: flex; gap: .75rem; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: .3rem; flex: 1; min-width: 140px; }
  .field label { font-size: .75rem; font-weight: 600; color: var(--muted); }
  .field input, .field select {
    padding: .45rem .65rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: .875rem;
    color: var(--text);
    background: #fff;
  }
  .field input:focus, .field select:focus {
    outline: none; border-color: var(--primary);
  }

  .preset-row { display: flex; gap: .45rem; flex-wrap: wrap; margin: .75rem 0; }
  .preset-btn {
    font-size: .75rem;
    padding: .25rem .6rem;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    color: var(--muted);
    transition: background .15s, color .15s, border-color .15s;
  }
  .preset-btn:hover { background: #eff6ff; color: var(--primary); border-color: var(--primary); }

  .next-run-note { font-size: .8rem; color: var(--muted); margin-top: .6rem; }
  .next-run-note span { color: var(--text); font-weight: 600; }

  /* ── Run history ── */
  .history-card { background: var(--card); border: 1px solid var(--border);
                   border-radius: var(--radius); box-shadow: var(--shadow); }
  .history-header {
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: .75rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .history-header .card-title { margin: 0; }
  .history-header-right { display: flex; align-items: center; gap: .6rem; }

  .search-wrap {
    position: relative; display: flex; align-items: center;
  }
  .search-wrap svg {
    position: absolute; left: .55rem;
    color: var(--muted); pointer-events: none;
  }
  .search-input {
    padding: .3rem .65rem .3rem 1.9rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: .82rem;
    width: 210px;
    color: var(--text);
    background: var(--bg);
    transition: border-color .15s, width .2s;
  }
  .search-input:focus { outline: none; border-color: var(--primary); width: 260px; background: #fff; }
  .search-input::placeholder { color: #94a3b8; }

  table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  thead th {
    text-align: left;
    padding: .65rem 1rem;
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    background: #f8fafc;
    border-bottom: 1px solid var(--border);
  }
  tbody tr.main-row { border-bottom: 1px solid #f1f5f9; transition: background .1s; cursor: pointer; }
  tbody tr.main-row:hover { background: #f8fafc; }
  tbody tr.main-row.row-match { background: #eff6ff; }
  tbody tr.main-row.row-match:hover { background: #dbeafe; }
  tbody tr.main-row.row-dimmed { opacity: .35; }
  tbody td { padding: .7rem 1rem; vertical-align: middle; }

  /* expand chevron */
  .chevron {
    display: inline-block;
    transition: transform .2s;
    color: var(--muted);
    font-size: .75rem;
    margin-right: .4rem;
    user-select: none;
  }
  tr.main-row.expanded .chevron { transform: rotate(90deg); }

  /* detail row */
  tr.detail-row { display: none; background: #f8fafc; border-bottom: 1px solid var(--border); }
  tr.detail-row.open { display: table-row; }
  tr.detail-row td { padding: .6rem 1rem .8rem 2.2rem; }
  .order-chips { display: flex; flex-wrap: wrap; gap: .4rem; }
  .order-chip {
    font-family: monospace;
    font-size: .78rem;
    padding: .2rem .55rem;
    background: #e2e8f0;
    color: var(--text);
    border-radius: 5px;
    border: 1px solid #cbd5e1;
    transition: background .15s;
  }
  .order-chip.chip-match {
    background: #bfdbfe;
    border-color: #93c5fd;
    color: #1e40af;
    font-weight: 700;
  }
  .no-orders-note { font-size: .78rem; color: var(--muted); font-style: italic; }

  .notes-input {
    width: 100%;
    padding: .3rem .5rem;
    border: 1px solid transparent;
    border-radius: 5px;
    font-size: .82rem;
    background: transparent;
    color: var(--text);
    transition: border-color .15s, background .15s;
  }
  .notes-input:focus {
    outline: none;
    border-color: var(--primary);
    background: #fff;
  }
  .notes-input:hover { border-color: var(--border); background: #f8fafc; }

  .ts { white-space: nowrap; }
  .ts .date { font-weight: 600; }
  .ts .time { font-size: .78rem; color: var(--muted); }

  .no-runs {
    padding: 2.5rem;
    text-align: center;
    color: var(--muted);
    font-size: .9rem;
  }

  /* ── Log modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 200;
    display: none;
    align-items: flex-start;
    justify-content: flex-end;
  }
  .modal-overlay.open { display: flex; }

  .log-panel {
    background: #0f172a;
    color: #e2e8f0;
    width: min(680px, 100vw);
    height: 100vh;
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 24px rgba(0,0,0,.3);
    animation: slideIn .2s ease;
  }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: none; } }

  .log-panel-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid #1e293b;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .log-panel-title { font-size: .9rem; font-weight: 700; color: #f1f5f9; }
  .log-panel-meta  { font-size: .75rem; color: #64748b; margin-top: .15rem; }
  .log-close {
    background: none; border: none; color: #94a3b8;
    font-size: 1.25rem; cursor: pointer; padding: .25rem;
    line-height: 1;
  }
  .log-close:hover { color: #f1f5f9; }

  .log-body {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.25rem;
    font-family: "Cascadia Code", "Fira Code", "Courier New", monospace;
    font-size: .78rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .log-body .log-err  { color: #f87171; }
  .log-body .log-ok   { color: #4ade80; }
  .log-body .log-info { color: #94a3b8; }

  .log-live-badge {
    display: none;
    font-size: .7rem;
    font-weight: 700;
    background: #4c1d95;
    color: #c4b5fd;
    padding: .15rem .5rem;
    border-radius: 999px;
    text-transform: uppercase;
    animation: pulse 1.5s infinite;
  }
  .log-live-badge.show { display: inline-block; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: #0f172a; color: #f1f5f9;
    padding: .65rem 1.1rem;
    border-radius: 8px;
    font-size: .85rem;
    box-shadow: var(--shadow-md);
    transform: translateY(10px);
    opacity: 0;
    transition: all .25s;
    z-index: 300;
    pointer-events: none;
  }
  #toast.show { transform: none; opacity: 1; }
  #toast.err  { background: #991b1b; }
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <span class="header-logo">⚙</span>
    <span class="header-title">Gavel Order Generator</span>
  </div>
  <div style="display:flex;align-items:center;gap:.75rem;">
    <span class="status-pill idle" id="headerStatus">Idle</span>
  </div>
</header>

<!-- ── Main ── -->
<main>
  <div class="grid-top">

    <!-- Run Now -->
    <div class="card">
      <div class="card-title">Manual Trigger</div>
      <div class="run-row">
        <button class="btn btn-run" id="runBtn" onclick="triggerRun()">
          <span class="spinner" id="runSpinner"></span>
          <span id="runBtnLabel">▶ Run Now</span>
        </button>
        <span class="run-status-text" id="runStatusText">Ready</span>
      </div>

      <button class="advanced-toggle" onclick="toggleAdvanced()">⚙ Advanced options</button>
      <div class="advanced-section" id="advancedSection">
        <label>Force re-run specific orders (one per line)</label>
        <textarea id="forceOrders" placeholder="114-0736807-3461028&#10;112-4705293-9692223"></textarea>
        <div class="advanced-hint">Leave blank to run normally (new orders only). Order numbers must be within the look-back window.</div>
      </div>
    </div>

    <!-- Schedule -->
    <div class="card">
      <div class="card-title">Auto Schedule</div>

      <div class="sched-toggle-row">
        <label class="toggle-switch">
          <input type="checkbox" id="schedEnabled" onchange="onSchedToggle()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span class="toggle-label" id="schedToggleLabel">Disabled</span>
      </div>

      <div class="field-row" id="schedFields">
        <div class="field" style="flex:2;">
          <label>Cron Expression</label>
          <input type="text" id="schedCron" placeholder="0 8 * * 1-5" value="0 8 * * 1-5">
        </div>
        <div class="field">
          <label>Timezone</label>
          <select id="schedTz">
            <option value="America/New_York">Eastern (ET)</option>
            <option value="America/Chicago">Central (CT)</option>
            <option value="America/Denver">Mountain (MT)</option>
            <option value="America/Los_Angeles">Pacific (PT)</option>
            <option value="UTC">UTC</option>
          </select>
        </div>
      </div>

      <div class="preset-row">
        <span style="font-size:.72rem;color:var(--muted);font-weight:600;align-self:center;">Presets:</span>
        <button class="preset-btn" onclick="setPreset('0 8,16 * * *')">8am &amp; 4pm daily</button>
        <button class="preset-btn" onclick="setPreset('0 8,16 * * 1-5')">8am &amp; 4pm weekdays</button>
        <button class="preset-btn" onclick="setPreset('0 8 * * 1-5')">Weekdays 8am</button>
        <button class="preset-btn" onclick="setPreset('0 8 * * *')">Daily 8am</button>
        <button class="preset-btn" onclick="setPreset('0 */2 * * *')">Every 2h</button>
        <button class="preset-btn" onclick="setPreset('0 * * * *')">Hourly</button>
      </div>

      <p class="next-run-note" id="nextRunNote" style="display:none;">
        Next run: <span id="nextRunTime">—</span>
      </p>

      <div style="margin-top:.85rem;">
        <button class="btn btn-primary btn-sm" onclick="saveSchedule()">Save Schedule</button>
      </div>
    </div>

  </div><!-- /grid-top -->

  <!-- Run history -->
  <div class="history-card">
    <div class="history-header">
      <div class="card-title">Run History</div>
      <div class="history-header-right">
        <div class="search-wrap">
          <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="8.5" cy="8.5" r="5.5"/><line x1="13.5" y1="13.5" x2="18" y2="18"/>
          </svg>
          <input class="search-input" id="searchInput" type="text"
                 placeholder="Search order number…"
                 oninput="doSearch(this.value)"
                 onkeydown="if(event.key==='Escape'){this.value='';doSearch('');}">
        </div>
        <button class="btn btn-ghost btn-sm" onclick="loadRuns()">↺ Refresh</button>
      </div>
    </div>
    <div id="historyBody">
      <div class="no-runs">Loading…</div>
    </div>
  </div>

</main><!-- /main -->

<!-- ── Log panel ── -->
<div class="modal-overlay" id="logOverlay" onclick="closeLog(event)">
  <div class="log-panel" onclick="event.stopPropagation()">
    <div class="log-panel-header">
      <div>
        <div class="log-panel-title" id="logTitle">Run Log</div>
        <div class="log-panel-meta" id="logMeta"></div>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;">
        <span class="log-live-badge" id="logLiveBadge">● Live</span>
        <button class="log-close" onclick="closeLogPanel()">✕</button>
      </div>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let activeRunId   = null;
let pollTimer     = null;
let logRunId      = null;
let logPollTimer  = null;
let runsCache     = [];

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  loadSchedule();
  loadRuns();
  // Check if something was already running
  const s = await apiFetch('/api/status');
  if (s?.active_run_id) {
    activeRunId = s.active_run_id;
    setRunningUI(true);
    startPollRun(activeRunId);
  }
})();

// Auto-refresh run history every 60 s so syncs and new runs appear automatically
setInterval(() => {
  // Skip while a run is actively being polled (it calls loadRuns on finish)
  if (!pollTimer) loadRuns();
}, 60_000);

// ── Run trigger ────────────────────────────────────────────────────────────
async function triggerRun() {
  const textarea = document.getElementById('forceOrders');
  const orders   = textarea.value.split('\n').map(s => s.trim()).filter(Boolean);
  const body     = orders.length ? { orders } : {};

  const res = await apiFetch('/api/run', { method: 'POST', body });
  if (!res) return;
  if (res.error === 'run_in_progress') {
    activeRunId = res.run_id;
    setRunningUI(true);
    startPollRun(activeRunId);
    toast('A run is already in progress — tracking it.');
    return;
  }
  activeRunId = res.run_id;
  setRunningUI(true);
  startPollRun(activeRunId);
  textarea.value = '';
  document.getElementById('advancedSection').classList.remove('open');
}

function setRunningUI(running) {
  const btn     = document.getElementById('runBtn');
  const spinner = document.getElementById('runSpinner');
  const label   = document.getElementById('runBtnLabel');
  const pill    = document.getElementById('headerStatus');
  const text    = document.getElementById('runStatusText');

  btn.disabled = running;
  spinner.classList.toggle('show', running);
  label.textContent = running ? 'Running…' : '▶ Run Now';
  pill.textContent  = running ? 'Running…' : 'Idle';
  pill.className    = 'status-pill ' + (running ? 'running' : 'idle');
  text.textContent  = running ? 'Processing orders…' : 'Ready';
  text.className    = 'run-status-text' + (running ? ' active' : '');
}

function startPollRun(runId) {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const run = await apiFetch(`/api/run/${runId}`);
    if (!run) return;
    if (run.status !== 'running') {
      clearInterval(pollTimer);
      pollTimer = null;
      activeRunId = null;
      setRunningUI(false);
      const ok = run.status === 'success';
      const label = ok
        ? `✓ Done — ${run.svgs} SVG(s), ${run.errors} error(s)`
        : `⚠ Finished with status: ${run.status}`;
      document.getElementById('runStatusText').textContent = label;
      loadRuns();
      // If log panel is open for this run, do one final refresh
      if (logRunId === runId) {
        renderLog(run);
        stopLogPoll();
      }
    }
  }, 2500);
}

// ── Advanced toggle ────────────────────────────────────────────────────────
function toggleAdvanced() {
  document.getElementById('advancedSection').classList.toggle('open');
}

// ── Schedule ───────────────────────────────────────────────────────────────
async function loadSchedule() {
  const cfg = await apiFetch('/api/schedule');
  if (!cfg) return;
  document.getElementById('schedEnabled').checked = !!cfg.enabled;
  document.getElementById('schedCron').value       = cfg.cron || '0 8 * * 1-5';
  const tzSel = document.getElementById('schedTz');
  if (cfg.timezone) tzSel.value = cfg.timezone;
  updateSchedToggleLabel(!!cfg.enabled);
  updateNextRun(cfg.next_run);
}

async function saveSchedule() {
  const enabled  = document.getElementById('schedEnabled').checked;
  const cron     = document.getElementById('schedCron').value.trim();
  const timezone = document.getElementById('schedTz').value;
  const res = await apiFetch('/api/schedule', { method: 'POST', body: { enabled, cron, timezone } });
  if (!res) return;
  if (res.error) { toast(res.error, true); return; }
  toast(enabled ? '✓ Schedule saved and active' : '✓ Schedule disabled');
  updateSchedToggleLabel(enabled);
  updateNextRun(res.next_run);
}

function onSchedToggle() {
  updateSchedToggleLabel(document.getElementById('schedEnabled').checked);
}

function updateSchedToggleLabel(enabled) {
  document.getElementById('schedToggleLabel').textContent = enabled ? 'Enabled' : 'Disabled';
}

function setPreset(cron) {
  document.getElementById('schedCron').value = cron;
}

function updateNextRun(iso) {
  const el = document.getElementById('nextRunNote');
  if (!iso) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  const d = new Date(iso);
  document.getElementById('nextRunTime').textContent = d.toLocaleString();
}

// ── Run history ────────────────────────────────────────────────────────────
let searchQuery = '';

async function loadRuns() {
  const runs = await apiFetch('/api/runs');
  if (!runs) return;
  runsCache = runs;
  renderHistory(runs);
}

function renderHistory(runs) {
  const container = document.getElementById('historyBody');
  if (!runs.length) {
    container.innerHTML = '<div class="no-runs">No runs yet — click Run Now to get started.</div>';
    return;
  }

  const rows = runs.map(r => {
    const dt      = new Date(r.started_at);
    const dateStr = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const timeStr = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const dur     = r.finished_at ? durationStr(r.started_at, r.finished_at) : '—';
    const badge   = statusBadge(r.status);
    const trigger = r.trigger === 'scheduled' ? '🕐 Scheduled'
                  : r.trigger === 'sync'      ? '🔄 Sync'
                  : r.trigger === 'download'  ? '⬇ Download'
                  :                             '👆 Manual';
    const notes   = escHtml(r.notes || '');
    const orders  = r.order_numbers || [];
    const ordersJson = escHtml(JSON.stringify(orders));

    const chipsHtml = orders.length
      ? orders.map(o => `<span class="order-chip" data-order="${escHtml(o)}">${escHtml(o)}</span>`).join('')
      : `<span class="no-orders-note">No order numbers recorded</span>`;

    return `
    <tr class="main-row" id="row-${r.id}" onclick="toggleExpand('${r.id}', event)">
      <td class="ts">
        <span class="chevron">▶</span>
        <div class="date" style="display:inline;">${dateStr}</div>
        <div class="time">${timeStr}</div>
      </td>
      <td style="white-space:nowrap;font-size:.8rem;color:var(--muted);">${trigger}</td>
      <td>${badge}</td>
      <td style="font-weight:600;text-align:center;">${(r.trigger === 'sync' || r.trigger === 'download') ? (r.notes || '—') : (r.svgs ?? '—')}</td>
      <td style="text-align:center;color:${r.errors > 0 ? 'var(--error)' : 'var(--muted)'};">${r.errors ?? '—'}</td>
      <td style="font-size:.78rem;color:var(--muted);">${dur}</td>
      <td style="min-width:160px;" onclick="event.stopPropagation()">
        <input class="notes-input" value="${notes}"
               onblur="saveNotes('${r.id}', this.value)"
               onkeydown="if(event.key==='Enter'){this.blur()}"
               placeholder="Add a note…">
      </td>
      <td onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="openLog('${r.id}')">Log</button>
      </td>
    </tr>
    <tr class="detail-row" id="detail-${r.id}">
      <td colspan="8">
        <div class="order-chips" id="chips-${r.id}">${chipsHtml}</div>
      </td>
    </tr>`;
  }).join('');

  container.innerHTML = `
  <table>
    <thead>
      <tr>
        <th>Date &amp; Time</th>
        <th>Trigger</th>
        <th>Status</th>
        <th style="text-align:center;">SVGs / Detail</th>
        <th style="text-align:center;">Errors</th>
        <th>Duration</th>
        <th>Notes</th>
        <th></th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;

  // Re-apply search highlighting after re-render
  if (searchQuery) doSearch(searchQuery);
}

function toggleExpand(runId, event) {
  const mainRow   = document.getElementById(`row-${runId}`);
  const detailRow = document.getElementById(`detail-${runId}`);
  const isOpen    = detailRow.classList.contains('open');
  mainRow.classList.toggle('expanded', !isOpen);
  detailRow.classList.toggle('open', !isOpen);
}

function doSearch(q) {
  searchQuery = q.trim().toLowerCase();
  const mainRows = document.querySelectorAll('tr.main-row');

  mainRows.forEach(row => {
    const runId = row.id.replace('row-', '');
    const chips = document.querySelectorAll(`#chips-${runId} .order-chip`);
    let rowMatch = false;

    chips.forEach(chip => {
      const orderNum = chip.dataset.order.toLowerCase();
      const match    = searchQuery && orderNum.includes(searchQuery);
      chip.classList.toggle('chip-match', match);
      if (match) rowMatch = true;
    });

    if (!searchQuery) {
      row.classList.remove('row-match', 'row-dimmed');
    } else {
      row.classList.toggle('row-match',  rowMatch);
      row.classList.toggle('row-dimmed', !rowMatch);
      // Auto-expand matching rows
      const detailRow = document.getElementById(`detail-${runId}`);
      if (rowMatch && detailRow) {
        detailRow.classList.add('open');
        row.classList.add('expanded');
      }
    }
  });
}

function statusBadge(status) {
  const map = {
    success: ['badge-success', '✓ Success'],
    warning: ['badge-warning', '⚠ Warning'],
    error:   ['badge-error',   '✕ Error'],
    running: ['badge-running', '● Running'],
  };
  const [cls, label] = map[status] || ['badge-idle', status || 'Unknown'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function durationStr(start, end) {
  const ms = new Date(end) - new Date(start);
  if (ms < 0) return '—';
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s`;
  return `${Math.floor(s/60)}m ${s%60}s`;
}

// ── Notes ──────────────────────────────────────────────────────────────────
async function saveNotes(runId, notes) {
  await apiFetch(`/api/notes/${runId}`, { method: 'POST', body: { notes } });
}

// ── Log panel ─────────────────────────────────────────────────────────────
async function openLog(runId) {
  logRunId = runId;
  document.getElementById('logOverlay').classList.add('open');
  document.getElementById('logBody').textContent = 'Loading…';
  document.getElementById('logTitle').textContent = 'Run Log';
  document.getElementById('logMeta').textContent = '';

  const run = await apiFetch(`/api/run/${runId}`);
  if (!run) return;
  renderLog(run);

  if (run.status === 'running') {
    startLogPoll(runId);
  }
}

function renderLog(run) {
  const dt = new Date(run.started_at);
  document.getElementById('logTitle').textContent =
    `Run — ${dt.toLocaleDateString()} ${dt.toLocaleTimeString()}`;
  document.getElementById('logMeta').textContent =
    `${run.trigger} · ${run.status} · ${run.svgs ?? 0} SVGs · ${run.errors ?? 0} errors`;

  const isLive = run.status === 'running';
  document.getElementById('logLiveBadge').classList.toggle('show', isLive);

  const body = document.getElementById('logBody');
  const lines = (run.log || '(no output yet)').split('\n');
  body.innerHTML = lines.map(line => {
    const cls = /ERROR|error:|EXCEPTION/.test(line) ? 'log-err'
              : /saved →|✓|Done\.|✓/.test(line)    ? 'log-ok'
              : 'log-info';
    return `<span class="${cls}">${escHtml(line)}</span>`;
  }).join('\n');
  body.scrollTop = body.scrollHeight;
}

function startLogPoll(runId) {
  stopLogPoll();
  logPollTimer = setInterval(async () => {
    const run = await apiFetch(`/api/run/${runId}`);
    if (!run || logRunId !== runId) { stopLogPoll(); return; }
    renderLog(run);
    if (run.status !== 'running') stopLogPoll();
  }, 2000);
}

function stopLogPoll() {
  clearInterval(logPollTimer);
  logPollTimer = null;
}

function closeLog(event) {
  if (event.target === document.getElementById('logOverlay')) closeLogPanel();
}

function closeLogPanel() {
  document.getElementById('logOverlay').classList.remove('open');
  stopLogPoll();
  logRunId = null;
}

// ── Helpers ────────────────────────────────────────────────────────────────
async function apiFetch(url, opts = {}) {
  try {
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      body: opts.body ? JSON.stringify(opts.body) : undefined,
      method: opts.method || 'GET',
    });
    const data = await res.json();
    if (!res.ok && !data.error) { toast(`Error ${res.status}`, true); return null; }
    return data;
  } catch (e) {
    toast('Network error', true);
    return null;
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

let toastTimer;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}
</script>
